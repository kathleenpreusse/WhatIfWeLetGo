workflows:
  ios-app-build:
    name: iOS App Build
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: AppleKey
    environment:
      xcode: "16.0"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.kathleenpreusse.whatifweletgo1
    scripts:
      - name: Create Export Options
        script: |
          cat > /Users/builder/export_options.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.kathleenpreusse.whatifweletgo1</key>
              <string>WhatIfWeLetGoProfile</string>
            </dict>
          </dict>
          </plist>
          EOF
      - name: Generate App Icons
        script: |
          sips -z 120 120 WhatIfWeLetGo/Assets.xcassets/AppIcon.appiconset/Icon1024.png --out WhatIfWeLetGo/Assets.xcassets/AppIcon.appiconset/Icon120.png
          sips -z 152 152 WhatIfWeLetGo/Assets.xcassets/AppIcon.appiconset/Icon1024.png --out WhatIfWeLetGo/Assets.xcassets/AppIcon.appiconset/Icon152.png
          sips -z 167 167 WhatIfWeLetGo/Assets.xcassets/AppIcon.appiconset/Icon1024.png --out WhatIfWeLetGo/Assets.xcassets/AppIcon.appiconset/Icon167.png
      - name: Build iOS app
        script: |
          xcodebuild \
            -project "WhatIfWeLetGo.xcodeproj" \
            -scheme "WhatIfWeLetGo" \
            -configuration Release \
            -archivePath build/WhatIfWeLetGo.xcarchive \
            PROVISIONING_PROFILE_SPECIFIER="WhatIfWeLetGoProfile" \
            CODE_SIGN_IDENTITY="Apple Distribution: Kathleen Preusse" \
            CODE_SIGN_STYLE=Manual \
            archive
          xcodebuild \
            -exportArchive \
            -archivePath build/WhatIfWeLetGo.xcarchive \
            -exportOptionsPlist /Users/builder/export_options.plist \
            -exportPath build/ios/ipa
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testfl
